name: CI

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Build Docker image
        run: docker build -t test-image ./week8/html

      - name: Validate Terraform
        run: |
          cd week11/terraform
          terraform init -backend=false
          terraform validate


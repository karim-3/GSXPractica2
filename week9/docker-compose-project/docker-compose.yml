version: '3.8'

services:
  nginx:
    image: nginx-gsx
    ports:
      - "80:80"
    networks:
      - gsx-network
    depends_on:
      - app

  app:
    build: .
    ports:
      - "3000:3000"
    environment:
      - DB_PASSWORD=${DB_PASSWORD}
    networks:
      - gsx-network
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:15-alpine
    environment:
      - POSTGRES_PASSWORD=${DB_PASSWORD}
      - POSTGRES_USER=gsx_user
      - POSTGRES_DB=greendev_db
    volumes:
      - db-data:/var/lib/postgresql/data
    networks:
      - gsx-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gsx_user -d greendev_db"]
      interval: 10s
      timeout: 5s
      retries: 5

networks:
  gsx-network:

volumes:
  db-data: